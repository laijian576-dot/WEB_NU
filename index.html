<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Nutrition</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* * 色彩与设计系统定义 (绿色系)
         * 参考了 NotebookLM 的清爽感，但注入了生机勃勃的健康绿
         */
        :root {
            --primary-green: #2E7D32;      /* 主标题、核心按钮的深绿色 */
            --accent-green: #4CAF50;       /* 悬浮、高亮时的活力绿 */
            --bg-light-green: #F1F8E9;     /* 极浅的绿色背景，用于区分区块 */
            --text-dark: #1F2937;          /* 主文本颜色，不使用纯黑以增加柔和感 */
            --text-gray: #4B5563;          /* 副标题、说明文本的灰色 */
            --white: #FFFFFF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Noto Sans SC', sans-serif;
        }

        body {
            color: var(--text-dark);
            background-color: var(--white);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* 顶部导航栏 */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px); /* 毛玻璃效果 */
            z-index: 1000;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-green);
        }

        /* 核心首屏 (Hero Section) */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 160px 5% 100px;
            background: linear-gradient(180deg, var(--bg-light-green) 0%, var(--white) 100%);
        }

        .hero h1 {
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 20px;
            max-width: 800px;
            color: var(--primary-green);
        }

        .hero p {
            font-size: 1.25rem;
            color: var(--text-gray);
            margin-bottom: 40px;
            max-width: 600px;
        }

        /* 下载按钮组 */
        .download-buttons {
            display: flex;
            gap: 20px;
            margin-bottom: 60px;
        }

        .btn {
            padding: 15px 30px;
            border-radius: 30px; /* 圆角按钮，更具现代感 */
            font-size: 1.1rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-primary {
            background-color: var(--primary-green);
            color: var(--white);
            box-shadow: 0 4px 15px rgba(46, 125, 50, 0.3);
        }

        .btn-primary:hover {
            background-color: var(--accent-green);
            transform: translateY(-2px); /* 悬浮时微微上浮 */
        }

        .btn-outline {
            border: 2px solid var(--primary-green);
            color: var(--primary-green);
            background-color: transparent;
        }

        .btn-outline:hover {
            background-color: var(--bg-light-green);
        }

        /* 首屏展示图 (手机模型) */
        .hero-image-container {
            width: 100%;
            max-width: 1000px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            /* 提示：这里为了占位使用了背景色，等你有了图片，这里会被图片覆盖 */
            background-color: #e0e0e0; 
            aspect-ratio: 16/9;
        }

        .hero-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* 功能介绍区块 */
        .features {
            padding: 100px 5%;
        }

        .feature-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1200px;
            margin: 0 auto 100px;
            gap: 50px;
        }

        /* 偶数行反转图片和文字位置 */
        .feature-row:nth-child(even) {
            flex-direction: row-reverse;
        }

        .feature-text {
            flex: 1;
        }

        .feature-text h2 {
            font-size: 2.5rem;
            color: var(--primary-green);
            margin-bottom: 20px;
        }

        .feature-text p {
            font-size: 1.1rem;
            color: var(--text-gray);
        }

        .feature-image {
            flex: 1;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            /* 占位背景 */
            background-color: var(--bg-light-green);
            aspect-ratio: 4/3; 
        }

        .feature-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 页脚 */
        footer {
            text-align: center;
            padding: 40px 5%;
            background-color: var(--bg-light-green);
            color: var(--text-gray);
            font-size: 0.9rem;
        }

        /* 响应式设计 (适配手机屏幕) */
        @media (max-width: 768px) {
            .hero h1 { font-size: 2.5rem; }
            .download-buttons { flex-direction: column; width: 100%; padding: 0 20px; }
            .feature-row, .feature-row:nth-child(even) { flex-direction: column; text-align: center; }
            .hero-image-container { aspect-ratio: 4/3; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">EatWell 绿洲</div>
    </header>

    <section class="hero">
        <h1>吃得健康，由记录开始。</h1>
        <p>一款懂你的智能饮食日记。无需繁琐计算，拍照即可识别热量与营养成分，让健康生活变成轻松的习惯。</p>
        
        <div class="download-buttons">
            <a href="https://drive.google.com/uc?export=download&id=12xCrP9njcqEoZZbrdFSZ-er_bGJjddb9" class="btn btn-primary">
                安卓版下载 (APK)
            </a>
        </div>

        <div class="hero-image-container">
            <img src="" alt="App主界面截图" onerror="this.style.display='none'">
        </div>
    </section>

    <section class="features">
        <div class="feature-row">
            <div class="feature-text">
                <h2>AI 拍照识别</h2>
                <p>对着你的午餐拍张照，我们的 AI 引擎能瞬间识别出食物种类，并估算卡路里与宏量营养素（蛋白质、脂肪、碳水）。告别手动输入的烦恼，记录只需一秒钟。</p>
            </div>
            <div class="feature-image">
                <img src="" alt="拍照识别功能演示" onerror="this.style.display='none'">
            </div>
        </div>

        <div class="feature-row">
            <div class="feature-text">
                <h2>个性化营养洞察</h2>
                <p>根据你的年龄、体重目标和过往饮食习惯，生成专属的健康周报。直观的图表让你清晰看到自己每天是否达标，营养摄入是否均衡。</p>
            </div>
            <div class="feature-image">
                <img src="" alt="数据图表演示" onerror="this.style.display='none'">
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 你的公司/团队名称. 保留所有权利.</p>
    </footer>

</body>
</html>
